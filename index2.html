<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Question & Answer</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header{
            background-color: #65b6e9;
            color: white;
            padding: 20px;
            text-align: center;
            width: 100%;
        }

        header h1{
            margin: 0;
        }

        .container{
            width: 80%;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .search-bar{
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        button{
            padding: 15px;
            background: #063e76;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 50x;
        }

        button:hover{
            background: #530df5;
        }

        input{
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            font-size: 1rem;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
    </style>

</head>

<body>
    <header>
        <h1>AI Question & Answer</h1>
        <p>Ask a question,get an AI-powered answer instantly</p>
    </header>
    <div class="container">
        <div class="search-bar">
            <input type="text" id="questionInput" placeholder="Ask a question about AI">
            <button onclick="generateAnswer()">Ask AI</button>
        </div>
        <div id="qaSection">

        </div>
    </div>
    <script>
        function generateAnswer() {
            const userQuestion = document.getElementById("questionInput").value;

            if(userQuestion.trim()==="") {
                alert("Please enter a Question!");
                return;
            }
            const answer = getAIAnswer(userQuestion);
            const qaSection = document.getElementById("qaSection");
            const qaCard = document.createElement("div");
            qaCard.className= "qa-card";
            qaCard.innerHTML = `
                <h3>Question: ${userQuestion}</h3>
                <p><strong>AI's Answer:</strong> ${answer}</p>
            `;
            qaSection.appendChild(qaCard);
            document.getElementById("questionInput").value="";
        }

        function getAIAnswer(question) {
            const responses = {
               "What is AI?":"AI is the simulation of human intelligence processes by machines,especially computer systems.",
               "How does machine learning work?":"Machine learning algorithms use statistical methods to enable systems to learn from data and make prediction or decisions",
                "What is deep learning?":"Deep learning is a subset of machine learning where artificial neural networks from vast amounts of data",
                "Hello":"Hi There",
                "How are you?":"I'm fine and you",
            };
            return responses[question]|| "Sorry, i don't have an answer for that yet. But i am learning!" ;
        }
    </script>

</body>
</html>
